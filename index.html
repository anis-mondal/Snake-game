<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimate Serpentine | Premium</title>
    
    <!-- Changed Font to Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        m3Primary: 'var(--color-primary)', m3Secondary: 'var(--color-secondary)'
                    },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-primary: #3B82F6; --color-secondary: #8B5CF6;
            --bg-gradient: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
            --glass-bg: rgba(30, 41, 59, 0.65); --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #F8FAFC; --text-muted: #94A3B8;
        }
        
        html.light {
            --color-primary: #2563EB; --color-secondary: #7C3AED;
            --bg-gradient: linear-gradient(135deg, #F0F9FF 0%, #E0E7FF 100%);
            --glass-bg: rgba(255, 255, 255, 0.8); --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #0F172A; --text-muted: #475569;
        }

        html, body {
            overflow: hidden; height: 100%; overscroll-behavior: none;
            touch-action: none; -webkit-tap-highlight-color: transparent;
            background: var(--bg-gradient); color: var(--text-main);
        }

        /* Premium Glassmorphism Panel - More compact for space */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border-radius: 1.5rem;
        }

        .canvas-container {
            width: 100%; max-width: 360px; /* Made slightly larger */
            aspect-ratio: 1 / 1;
            margin: 0 auto; position: relative; overflow: hidden;
            border-radius: 1.25rem;
        }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        /* XP Bar & Combo Bar */
        .progress-bg { background: rgba(0,0,0,0.25); border-radius: 999px; overflow: hidden; height: 6px; width: 100%; }
        html.light .progress-bg { background: rgba(0,0,0,0.1); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--color-primary), var(--color-secondary)); transition: width 0.3s ease; border-radius: 999px; }

        /* Compact Circular Controller to save space */
        .d-pad-wrapper {
            display: grid; 
            grid-template-columns: repeat(3, 44px); 
            grid-template-rows: repeat(3, 44px); 
            gap: 6px;
            justify-content: center; 
            align-content: center;
            margin: 0 auto; 
            padding: 12px;
            border-radius: 50%;
            width: max-content;
            aspect-ratio: 1 / 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25), inset 0 2px 10px rgba(255,255,255,0.05);
        }
        .d-btn {
            background: rgba(255,255,255,0.04); color: var(--color-primary); 
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 18px; display: flex; justify-content: center; align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); user-select: none;
        }
        html.light .d-btn { background: rgba(0,0,0,0.03); }
        .d-btn:active { transform: scale(0.85); background: var(--color-primary); color: #fff; box-shadow: 0 0 15px var(--color-primary); }

        .btn-up { grid-column: 2; grid-row: 1; } .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; } .btn-down { grid-column: 2; grid-row: 3; }
        
        .play-pause-btn {
            grid-column: 2; grid-row: 2; border-radius: 50%; font-size: 18px; font-weight: 900;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: #fff;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transition: transform 0.1s;
        }
        .play-pause-btn:active { transform: scale(0.9); }

        /* Floating Animations */
        .floating-text {
            position: absolute; font-weight: 900; font-family: 'Nunito', sans-serif;
            pointer-events: none; animation: floatUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; z-index: 30;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5); font-size: 1.2rem;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(0.5); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }

        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%,90%{transform:translate3d(-2px,0,0)} 20%,80%{transform:translate3d(3px,0,0)} 30%,50%,70%{transform:translate3d(-5px,0,0)} 40%,60%{transform:translate3d(5px,0,0)} }

        /* Modal & Shop */
        .shop-item { border: 2px solid var(--glass-border); border-radius: 1rem; padding: 0.6rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; background: rgba(0,0,0,0.15); }
        html.light .shop-item { background: rgba(255,255,255,0.4); }
        .shop-item.locked { opacity: 0.7; filter: grayscale(100%); }
        .shop-item.active { border-color: var(--color-primary); background: rgba(59, 130, 246, 0.15); transform: scale(1.03); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .shop-item:active { transform: scale(0.95); }
        .coin-icon { color: #F5BE48; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        .combo-glow { box-shadow: 0 0 30px var(--color-primary), inset 0 0 20px var(--color-secondary) !important; border-color: var(--color-primary) !important; }
        
        .color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body class="font-sans transition-colors duration-500 flex flex-col min-h-screen p-3 pb-6 justify-between lg:justify-center gap-3">

    <!-- Top Status Bar (More Compact) -->
    <div class="glass-panel w-full max-w-[360px] mx-auto p-3 flex flex-col gap-2.5">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-m3Primary to-m3Secondary">Serpentine</h1>
            </div>
            <div class="flex gap-1.5">
                <div class="flex items-center gap-1.5 bg-black/20 dark:bg-white/10 px-2.5 py-1 rounded-full border border-white/10 shadow-inner">
                    <span class="coin-icon text-sm">🪙</span> <span id="coinCount" class="font-black font-mono text-sm">0</span>
                </div>
                <!-- Fullscreen Button -->
                <button id="fullscreenBtn" class="w-8 h-8 flex justify-center items-center rounded-full bg-black/20 dark:bg-white/10 active:scale-90 transition-transform border border-white/10 shadow-sm hover:bg-black/30 dark:hover:bg-white/20">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <button id="menuBtn" class="w-8 h-8 flex justify-center items-center rounded-full bg-black/20 dark:bg-white/10 active:scale-90 transition-transform border border-white/10 shadow-sm hover:bg-black/30 dark:hover:bg-white/20">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </button>
            </div>
        </div>

        <div class="w-full bg-black/10 dark:bg-black/20 p-2 rounded-xl border border-white/5">
            <div class="flex justify-between text-[10px] font-extrabold uppercase tracking-widest opacity-90 mb-1">
                <span id="levelText" class="text-m3Primary">Level 1</span>
                <span>XP: <span id="xpText">0/1000</span></span>
            </div>
            <div class="progress-bg"><div id="xpBar" class="progress-fill" style="width: 0%;"></div></div>
        </div>

        <div class="flex justify-between items-end px-1">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase font-bold opacity-70 tracking-wider">Score</span>
                <span id="score" class="text-2xl font-black font-mono leading-none bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-400 dark:from-white dark:to-gray-300">0</span>
            </div>
            <div class="flex flex-col items-end w-1/2">
                <span class="text-[10px] uppercase font-bold text-m3Secondary mb-1 flex items-center gap-1">
                    <span id="comboGlowIcon" class="hidden animate-pulse">🔥</span> Combo <span id="comboText">x1</span>
                </span>
                <div class="progress-bg w-full h-1.5"><div id="comboBar" class="progress-fill" style="width: 0%; background: var(--color-primary);"></div></div>
            </div>
        </div>
    </div>

    <!-- Game Canvas -->
    <div class="w-full max-w-[360px] mx-auto relative flex-1 flex items-center justify-center min-h-[320px]">
        <div class="glass-panel canvas-container p-1.5 transition-all duration-300 shadow-2xl" id="canvasContainer">
            <canvas id="gameCanvas" width="300" height="300" class="rounded-xl bg-black/5 dark:bg-black/30 w-full h-full object-contain"></canvas>
            
            <div id="gameOverScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-xl opacity-0 pointer-events-none transition-opacity duration-300 z-20 rounded-[1.25rem]">
                <h2 class="text-4xl font-black mb-2 text-white tracking-widest text-transparent bg-clip-text bg-gradient-to-br from-red-400 to-red-600 drop-shadow-lg">GAMEOVER</h2>
                <div class="flex gap-6 my-3 bg-white/5 p-3 rounded-2xl border border-white/10 w-[85%] justify-center">
                    <div class="text-center"><p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider">Score</p><p id="finalScore" class="text-2xl font-black text-white font-mono">0</p></div>
                    <div class="w-px bg-white/20"></div>
                    <div class="text-center"><p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider">Best</p><p id="highScoreText" class="text-2xl font-black text-m3Primary font-mono">0</p></div>
                </div>
                <div class="flex items-center gap-2 mb-5 bg-white/10 px-4 py-2 rounded-full border border-white/10 shadow-inner">
                    <span class="coin-icon text-lg">🪙</span><span class="text-xs font-bold text-gray-200">Earned: <span id="earnedCoins" class="text-yellow-400 font-mono text-base ml-1">0</span></span>
                </div>
                <button id="restartBtn" class="px-8 py-3 bg-gradient-to-r from-m3Primary to-m3Secondary text-white rounded-full font-black shadow-[0_4px_20px_rgba(59,130,246,0.5)] active:scale-95 transition-all text-base uppercase tracking-widest border border-white/20">
                    Try Again
                </button>
            </div>
        </div>
    </div>

    <!-- Circular D-Pad Controller -->
    <div class="d-pad-wrapper">
        <button class="d-btn btn-up" id="btnUp">▲</button>
        <button class="d-btn btn-left" id="btnLeft">◀</button>
        <button class="play-pause-btn" id="btnPlayPause">▶</button>
        <button class="d-btn btn-right" id="btnRight">▶</button>
        <button class="d-btn btn-down" id="btnDown">▼</button>
    </div>

    <!-- Settings & Shop Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 hidden justify-center items-end sm:items-center z-50 backdrop-blur-md">
        <div class="glass-panel w-full sm:w-[90%] max-w-sm rounded-t-[2.5rem] sm:rounded-3xl p-5 max-h-[85vh] flex flex-col animate-[slideUp_0.3s_ease-out] border-b-0 sm:border-b shadow-[0_-10px_40px_rgba(0,0,0,0.3)]">
            
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-m3Primary to-m3Secondary">Options</h2>
                <button id="closeModalBtn" class="w-9 h-9 rounded-full bg-black/10 dark:bg-white/10 flex justify-center items-center active:scale-90 font-bold text-lg border border-white/5 hover:bg-black/20 dark:hover:bg-white/20 transition-colors">✕</button>
            </div>
            
            <div class="flex gap-2 mb-4 p-1.5 bg-black/10 dark:bg-black/30 rounded-2xl border border-white/5">
                <button id="tabShop" class="flex-1 py-2 font-bold text-sm rounded-xl bg-m3Primary text-white shadow-md transition-all">Skins Shop</button>
                <button id="tabSettings" class="flex-1 py-2 font-bold text-sm rounded-xl text-gray-500 dark:text-gray-400 transition-all hover:bg-white/5">Settings</button>
            </div>

            <!-- Shop Tab -->
            <div id="shopContent" class="overflow-y-auto flex-1 pb-2 custom-scrollbar">
                <div class="flex justify-between items-center mb-3 px-2">
                    <h3 class="font-bold text-xs uppercase tracking-widest opacity-70">Unlock Patterns</h3>
                    <div class="text-xs font-bold bg-white/10 dark:bg-black/20 px-3 py-1 rounded-full shadow-inner border border-white/5"><span class="coin-icon">🪙</span> <span id="shopCoins">0</span></div>
                </div>
                <div class="grid grid-cols-2 gap-3" id="designGrid"></div>
            </div>

            <!-- Settings Tab -->
            <div id="settingsContent" class="overflow-y-auto flex-1 pb-2 hidden flex-col gap-3">
                <div class="flex justify-between items-center bg-black/5 dark:bg-black/20 p-3.5 rounded-2xl border border-white/5 shadow-sm">
                    <span class="font-bold text-sm">Theme Mode</span>
                    <button id="themeToggleBtn" class="px-5 py-2 bg-m3Primary text-white rounded-full font-bold shadow-md active:scale-95 text-xs uppercase tracking-wider transition-all">Toggle</button>
                </div>
                <div class="flex justify-between items-center bg-black/5 dark:bg-black/20 p-3.5 rounded-2xl border border-white/5 shadow-sm">
                    <span class="font-bold text-sm">Haptics & Sound</span>
                    <button id="soundToggleBtn" class="px-5 py-2 bg-m3Primary text-white rounded-full font-bold shadow-md active:scale-95 text-xs uppercase tracking-wider transition-all">ON</button>
                </div>
                <div class="bg-black/5 dark:bg-black/20 p-4 rounded-2xl border border-white/5 shadow-sm">
                    <h3 class="font-bold mb-3 text-xs uppercase tracking-widest opacity-70 text-center">App Colors</h3>
                    <div class="flex flex-wrap justify-center gap-3" id="themeGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core Variables & Storage ---
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        const canvasContainer = document.getElementById("canvasContainer");
        const gridSize = 15; const tileCount = 20; 
        
        let speed = 6; 
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 }; let specialFood = null; 
        
        let dx = 0, dy = 0; let moveQueue = []; let currentDx = 0, currentDy = 0;
        let score = 0; let sessionCoins = 0;
        let isPaused = true; let isGameOver = false; let gameLoop; 

        let comboMultiplier = 1; let comboTimer = 0; const MAX_COMBO = 35; 
        let particles = []; let frames = 0;
        
        let soundEnabled = true; let isDarkMode = true;
        let currentThemeId = 0; let currentDesignId = 0; 

        // Persistent Data
        let highScore = parseInt(localStorage.getItem('premiumSnakeBest')) || 0;
        let totalCoins = parseInt(localStorage.getItem('premiumCoins')) || 0;
        let playerXP = parseInt(localStorage.getItem('premiumXP')) || 0;
        let unlockedDesigns = JSON.parse(localStorage.getItem('premiumUnlocked')) || [0, 1]; 

        document.getElementById('highScoreText').innerText = highScore;
        document.getElementById('coinCount').innerText = totalCoins;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- Data Assets ---
        const themes = [
            { id: 0, color: '#3B82F6', l: {p:'#2563EB', s:'#60A5FA', f:'#DC2626'}, d: {p:'#3B82F6', s:'#93C5FD', f:'#F87171'} },
            { id: 1, color: '#10B981', l: {p:'#16A34A', s:'#4ADE80', f:'#DC2626'}, d: {p:'#22C55E', s:'#86EFAC', f:'#F87171'} },
            { id: 2, color: '#8B5CF6', l: {p:'#9333EA', s:'#C084FC', f:'#0D9488'}, d: {p:'#A855F7', s:'#D8B4FE', f:'#14B8A6'} },
            { id: 3, color: '#F43F5E', l: {p:'#E11D48', s:'#FB7185', f:'#2563EB'}, d: {p:'#F43F5E', s:'#FDA4AF', f:'#3B82F6'} },
            { id: 4, color: '#F59E0B', l: {p:'#D97706', s:'#FBBF24', f:'#4F46E5'}, d: {p:'#F59E0B', s:'#FDE68A', f:'#6366F1'} }
        ];

        const skins = [
            { id: 0, name: "Basic", price: 0, desc: "Classic smooth style" },
            { id: 1, name: "Pixel", price: 0, desc: "Retro square blocks" },
            { id: 2, name: "Ninja", price: 15, desc: "Sharp diamond edges" },
            { id: 3, name: "Mecha", price: 30, desc: "Segmented armor plates" },
            { id: 4, name: "Neon", price: 50, desc: "Glowing energy core" }
        ];

        // --- Haptics & Sound ---
        function vibe(type) {
            if (!navigator.vibrate || !soundEnabled) return;
            try {
                if (type === 'move') navigator.vibrate(10);
                else if (type === 'eat') navigator.vibrate(25);
                else if (type === 'special') navigator.vibrate([40, 20, 60]);
                else if (type === 'die') navigator.vibrate([100, 50, 200]);
            } catch(e){}
        }

        function playSound(type) {
            if (!soundEnabled) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'eat') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600 + (comboMultiplier*150), audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200 + (comboMultiplier*200), audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'coin') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(2000, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'die') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function showJuice(text, x, y, color) {
            const el = document.createElement('div'); el.className = 'floating-text'; el.innerText = text; el.style.color = color;
            el.style.left = `calc(${(x / tileCount) * 100}% - 10px)`; el.style.top = `calc(${(y / tileCount) * 100}% - 10px)`;
            canvasContainer.appendChild(el); setTimeout(() => el.remove(), 800);
            
            for(let i=0; i<8; i++) {
                particles.push({
                    x: x * gridSize + gridSize/2, y: y * gridSize + gridSize/2,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                    life: 1, color: color, size: Math.random() * 3 + 1
                });
            }
        }

        // --- Progression System ---
        function getLevelInfo(xp) {
            const level = Math.floor(Math.sqrt(xp / 100)) + 1;
            const currentLevelXP = Math.pow(level - 1, 2) * 100;
            const nextLevelXP = Math.pow(level, 2) * 100;
            const progress = ((xp - currentLevelXP) / (nextLevelXP - currentLevelXP)) * 100;
            return { level, currentXP: xp, maxXP: nextLevelXP, progress };
        }

        function updateUI() {
            document.getElementById("score").innerText = score;
            
            const bar = document.getElementById("comboBar"); const comboTxt = document.getElementById("comboText");
            bar.style.width = `${(comboTimer / MAX_COMBO) * 100}%`;
            comboTxt.innerText = `x${comboMultiplier}`;
            
            if(comboMultiplier >= 5) {
                document.getElementById('comboGlowIcon').classList.remove('hidden');
                canvasContainer.classList.add('combo-glow');
                comboTxt.classList.add('animate-pulse', 'text-yellow-400');
            } else {
                document.getElementById('comboGlowIcon').classList.add('hidden');
                canvasContainer.classList.remove('combo-glow');
                comboTxt.classList.remove('animate-pulse', 'text-yellow-400');
            }

            const lvlInfo = getLevelInfo(playerXP);
            document.getElementById('levelText').innerText = `Lv. ${lvlInfo.level}`;
            document.getElementById('xpText').innerText = `${lvlInfo.currentXP}/${lvlInfo.maxXP}`;
            document.getElementById('xpBar').style.width = `${lvlInfo.progress}%`;
        }

        // --- Render Engine ---
        function loop() {
            requestAnimationFrame(loop); frames++;
            const tickRate = Math.max(2, Math.floor(25 - speed)); 
            if (frames % tickRate === 0 && !isPaused && !isGameOver) moveSnake();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid(); if (!isGameOver) drawFoods(); drawSnake();
            
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            } ctx.globalAlpha = 1.0;
        }

        function drawGrid() {
            ctx.strokeStyle = isDarkMode ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)'; ctx.lineWidth = 1; ctx.beginPath();
            for (let i = 0; i <= tileCount; i++) { let pos = (i * gridSize) + 0.5; ctx.moveTo(pos, 0); ctx.lineTo(pos, canvas.height); ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos); }
            ctx.stroke();
        }

        function drawSnake() {
            const colors = themes[currentThemeId][isDarkMode?'d':'l'];
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? colors.p : colors.s;
                let px = part.x * gridSize; let py = part.y * gridSize; let s = gridSize;
                
                ctx.beginPath();
                if (currentDesignId === 0) {
                    ctx.roundRect(px+1, py+1, s-2, s-2, index === 0 ? 6 : 4);
                } else if (currentDesignId === 1) {
                    ctx.rect(px, py, s, s); ctx.strokeStyle = isDarkMode ? '#1E293B' : '#FFFFFF'; ctx.lineWidth = 1; ctx.stroke();
                } else if (currentDesignId === 2) {
                    ctx.moveTo(px + s/2, py); ctx.lineTo(px + s, py + s/2); ctx.lineTo(px + s/2, py + s); ctx.lineTo(px, py + s/2);
                } else if (currentDesignId === 3) {
                    ctx.roundRect(px+1, py+1, s-2, s-2, 2); ctx.strokeStyle = '#000'; ctx.lineWidth=1.5; ctx.stroke();
                } else if (currentDesignId === 4) {
                    ctx.shadowBlur = 12; ctx.shadowColor = ctx.fillStyle; ctx.arc(px + s/2, py + s/2, s/2 - 2, 0, Math.PI*2);
                }
                ctx.fill(); ctx.shadowBlur = 0;

                if (index === 0 && currentDesignId !== 1 && currentDesignId !== 2) {
                    ctx.fillStyle = isDarkMode ? '#0F172A' : '#FFF';
                    let e1x = 4, e1y = 5, e2x = 11, e2y = 5; 
                    if (currentDx === 1) { e1x = 10; e1y = 4; e2x = 10; e2y = 11; } else if (currentDx === -1) { e1x = 5; e1y = 4; e2x = 5; e2y = 11; } else if (currentDy === 1) { e1x = 4; e1y = 10; e2x = 11; e2y = 10; } 
                    ctx.beginPath(); ctx.arc(px + e1x, py + e1y, 2, 0, Math.PI*2); ctx.arc(px + e2x, py + e2y, 2, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        function drawFoods() {
            const fColor = themes[currentThemeId][isDarkMode?'d':'l'].f; ctx.fillStyle = fColor;
            let px = food.x * gridSize; let py = food.y * gridSize; let s = gridSize;
            ctx.beginPath();
            if (currentDesignId === 1 || currentDesignId === 2) { ctx.rect(px+2, py+2, s-4, s-4); } 
            else { let pulse = Math.sin(frames * 0.1) * 1.5; ctx.arc(px + s/2, py + s/2, (s/2 - 2) + pulse, 0, Math.PI*2); }
            ctx.fill();

            if (specialFood) {
                ctx.fillStyle = '#F5BE48'; ctx.shadowBlur = 15; ctx.shadowColor = '#F5BE48';
                let gx = specialFood.x * gridSize; let gy = specialFood.y * gridSize;
                ctx.beginPath(); ctx.arc(gx + s/2, gy + s/2, s/2 - 2, 0, Math.PI*2);
                ctx.fill(); ctx.shadowBlur = 0;
                ctx.fillStyle = '#92400E'; ctx.font = "bold 10px 'Nunito'"; ctx.textAlign = "center"; ctx.fillText("C", gx + s/2, gy + 11);
            }
        }

        // --- Logic ---
        function moveSnake() {
            if (moveQueue.length > 0) {
                let nextMove = moveQueue.shift(); currentDx = nextMove.dx; currentDy = nextMove.dy; dx = currentDx; dy = currentDy;
            }

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            if (head.x < 0) head.x = tileCount - 1; if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1; if (head.y >= tileCount) head.y = 0;
            
            for (let i = 0; i < snake.length; i++) { if (head.x === snake[i].x && head.y === snake[i].y) return triggerGameOver(); }
            
            snake.unshift(head); let ate = false;
            
            if (head.x === food.x && head.y === food.y) {
                let pts = 10 * comboMultiplier; score += pts; playerXP += pts; 
                playSound('eat'); vibe('eat'); showJuice(`+${pts}`, food.x, food.y, themes[currentThemeId][isDarkMode?'d':'l'].p);
                
                comboTimer = MAX_COMBO; comboMultiplier = Math.min(comboMultiplier + 1, 5); 
                placeFood(); ate = true; speed = Math.min(speed + 0.15, 20); 
            } 
            else if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
                playSound('coin'); vibe('special'); showJuice(`+5🪙`, specialFood.x, specialFood.y, "#F5BE48");
                sessionCoins += 5; totalCoins += 5; document.getElementById('coinCount').innerText = totalCoins;
                localStorage.setItem('premiumCoins', totalCoins);
                specialFood = null; ate = true;
            }
            
            if (!ate) { snake.pop(); if (comboTimer > 0) comboTimer--; else comboMultiplier = 1; }
            if (specialFood) { specialFood.timer--; if (specialFood.timer <= 0) specialFood = null; }
            updateUI();
        }

        function triggerGameOver() {
            isGameOver = true; playSound('die'); vibe('die');
            canvasContainer.classList.add('shake'); setTimeout(() => canvasContainer.classList.remove('shake'), 300);
            
            if (score > highScore) { highScore = score; localStorage.setItem('premiumSnakeBest', highScore); document.getElementById('highScoreText').innerText = highScore; }
            localStorage.setItem('premiumXP', playerXP);
            
            document.getElementById("finalScore").innerText = score;
            document.getElementById("earnedCoins").innerText = sessionCoins;
            document.getElementById("gameOverScreen").classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById("btnPlayPause").innerText = "▶";
        }

        function placeFood() {
            food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            if (snake.some(part => part.x === food.x && part.y === food.y)) return placeFood();

            if (!specialFood && Math.random() < 0.15 && score > 20) {
                let gx = Math.floor(Math.random() * tileCount); let gy = Math.floor(Math.random() * tileCount);
                if (!snake.some(part => part.x === gx && part.y === gy) && (gx !== food.x || gy !== food.y)) { specialFood = { x: gx, y: gy, timer: 50 }; }
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }]; dx = 0; dy = 0; currentDx = 0; currentDy = 0; moveQueue = [];
            score = 0; sessionCoins = 0; speed = 6; specialFood = null; comboMultiplier = 1; comboTimer = 0;
            updateUI(); isGameOver = false; document.getElementById("gameOverScreen").classList.add('opacity-0', 'pointer-events-none');
            placeFood(); isPaused = true; document.getElementById("btnPlayPause").innerText = "▶"; 
        }

        // --- Controls ---
        function togglePlayPause() {
            vibe('move');
            if (isGameOver) return resetGame();
            isPaused = !isPaused;
            if (!isPaused) { document.getElementById("btnPlayPause").innerHTML = "<b>||</b>"; if (dx===0 && dy===0) setDir(1, 0); } 
            else { document.getElementById("btnPlayPause").innerText = "▶"; }
        }

        function setDir(newDx, newDy) { 
            if (isPaused && !isGameOver) togglePlayPause(); vibe('move');
            let lastReq = moveQueue.length > 0 ? moveQueue[moveQueue.length - 1] : {dx: currentDx, dy: currentDy};
            if (newDx !== 0 && lastReq.dx === -newDx) return; if (newDy !== 0 && lastReq.dy === -newDy) return; 
            if (moveQueue.length < 2) moveQueue.push({dx: newDx, dy: newDy});
        }

        document.getElementById('btnUp').onclick = () => setDir(0, -1); document.getElementById('btnDown').onclick = () => setDir(0, 1);
        document.getElementById('btnLeft').onclick = () => setDir(-1, 0); document.getElementById('btnRight').onclick = () => setDir(1, 0);
        document.getElementById('btnPlayPause').onclick = togglePlayPause; document.getElementById('restartBtn').onclick = resetGame;

        let tStartX = 0, tStartY = 0;
        canvasContainer.addEventListener('touchstart', e => { 
            // Fix: If Game Over screen is open, allow clicks to pass through to the button!
            if (isGameOver) return; 
            
            tStartX = e.touches[0].clientX; tStartY = e.touches[0].clientY; 
            e.preventDefault(); 
        }, {passive: false});
        
        canvasContainer.addEventListener('touchend', e => {
            if (isGameOver) return;
            let diffX = e.changedTouches[0].clientX - tStartX; let diffY = e.changedTouches[0].clientY - tStartY;
            if (Math.abs(diffX) < 30 && Math.abs(diffY) < 30) { if(e.target===canvas) togglePlayPause(); return; }
            if (Math.abs(diffX) > Math.abs(diffY)) { if (diffX > 0) setDir(1, 0); else setDir(-1, 0); } else { if (diffY > 0) setDir(0, 1); else setDir(0, -1); }
            e.preventDefault();
        }, {passive: false});

        // Fullscreen Logic
        document.getElementById('fullscreenBtn').onclick = () => {
            vibe('move');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        };

        // --- Shop & Settings UI ---
        function applyTheme() {
            const root = document.documentElement; const colors = themes[currentThemeId][isDarkMode?'d':'l'];
            root.style.setProperty('--color-primary', colors.p); root.style.setProperty('--color-secondary', colors.s);
            document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
            document.getElementById(`swatch-${currentThemeId}`).classList.add('active');
            renderShop();
        }

        function renderShop() {
            const dGrid = document.getElementById('designGrid'); dGrid.innerHTML = '';
            document.getElementById('shopCoins').innerText = totalCoins;
            skins.forEach(s => {
                const isUnlocked = unlockedDesigns.includes(s.id);
                const isActive = currentDesignId === s.id;
                
                let btn = document.createElement('div'); 
                btn.className = `shop-item ${isUnlocked ? '' : 'locked'} ${isActive ? 'active' : ''}`;
                
                let content = `<h4 class="font-black text-sm">${s.name}</h4><p class="text-[10px] opacity-70 mb-2 leading-tight">${s.desc}</p>`;
                if (isActive) content += `<div class="text-[10px] font-bold text-m3Primary tracking-wider">EQUIPPED</div>`;
                else if (isUnlocked) content += `<div class="text-[10px] font-bold tracking-wider">SELECT</div>`;
                else content += `<div class="text-xs font-bold bg-black/20 dark:bg-black/50 rounded-full inline-flex items-center gap-1 px-3 py-1 border border-white/5 shadow-inner"><span class="coin-icon">🪙</span> ${s.price}</div>`;
                
                btn.innerHTML = content;
                btn.onclick = () => {
                    vibe('move');
                    if (isUnlocked) { currentDesignId = s.id; renderShop(); }
                    else if (totalCoins >= s.price) {
                        totalCoins -= s.price; unlockedDesigns.push(s.id);
                        localStorage.setItem('premiumCoins', totalCoins); localStorage.setItem('premiumUnlocked', JSON.stringify(unlockedDesigns));
                        document.getElementById('coinCount').innerText = totalCoins; currentDesignId = s.id; renderShop(); vibe('special');
                    } else { btn.classList.add('shake'); setTimeout(()=>btn.classList.remove('shake'), 300); }
                };
                dGrid.appendChild(btn);
            });
        }

        function initSettings() {
            const tGrid = document.getElementById('themeGrid');
            themes.forEach(t => {
                let div = document.createElement('div'); div.className = 'color-swatch';
                div.style.backgroundColor = t.color; div.id = `swatch-${t.id}`;
                div.onclick = () => { vibe('move'); currentThemeId = t.id; applyTheme(); }; tGrid.appendChild(div);
            });
            applyTheme();
        }

        const modal = document.getElementById('settingsModal');
        const tabShop = document.getElementById('tabShop'); const tabSettings = document.getElementById('tabSettings');
        const contentShop = document.getElementById('shopContent'); const contentSettings = document.getElementById('settingsContent');

        document.getElementById('menuBtn').onclick = () => { vibe('move'); modal.classList.remove('hidden'); modal.classList.add('flex'); renderShop(); };
        document.getElementById('closeModalBtn').onclick = () => { vibe('move'); modal.classList.add('hidden'); modal.classList.remove('flex'); };
        
        tabShop.onclick = () => {
            tabShop.className = "flex-1 py-2 font-bold text-sm rounded-xl bg-m3Primary text-white shadow-md transition-all";
            tabSettings.className = "flex-1 py-2 font-bold text-sm rounded-xl text-gray-500 dark:text-gray-400 transition-all hover:bg-white/5";
            contentShop.classList.remove('hidden'); contentSettings.classList.add('hidden'); contentSettings.classList.remove('flex');
        };
        tabSettings.onclick = () => {
            tabSettings.className = "flex-1 py-2 font-bold text-sm rounded-xl bg-m3Primary text-white shadow-md transition-all";
            tabShop.className = "flex-1 py-2 font-bold text-sm rounded-xl text-gray-500 dark:text-gray-400 transition-all hover:bg-white/5";
            contentSettings.classList.remove('hidden'); contentSettings.classList.add('flex'); contentShop.classList.add('hidden');
        };

        const themeToggleBtn = document.getElementById('themeToggleBtn');
        themeToggleBtn.onclick = () => { 
            vibe('move'); isDarkMode = !isDarkMode; 
            document.documentElement.className = isDarkMode ? "dark" : "light";
            themeToggleBtn.innerHTML = isDarkMode ? "Light Mode" : "Dark Mode"; applyTheme(); 
        };
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        soundToggleBtn.onclick = () => {
            vibe('move'); soundEnabled = !soundEnabled;
            soundToggleBtn.innerText = soundEnabled ? "ON" : "OFF";
            soundToggleBtn.style.background = soundEnabled ? "var(--color-primary)" : "transparent";
            soundToggleBtn.style.color = soundEnabled ? "#fff" : "var(--text-muted)";
            soundToggleBtn.style.border = soundEnabled ? "none" : "1px solid var(--text-muted)";
        };

        initSettings(); placeFood(); updateUI(); requestAnimationFrame(loop);
    </script>
</body>
